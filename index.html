<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="img/instagramLogo.png" />
  </head>
  <body>
    <section class="logIn2P">
      <div class="firstBlock">
        <div class="instaName">
          <img src="img/nameLogo.png" alt="instagram name" />
        </div>

        <div class="logInInput">
            
          
          <input type="text" class="TelEmailUser" placeholder=" Telefone, nome de usuário ou email " />

          
          <input type="password" class="passWord" placeholder="Senha"/>

        </div>

        <div class="logInBtn"></div>
      </div>
    </section>
  </body>
</html>
