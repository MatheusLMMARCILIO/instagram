<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="img/instagramLogo.png" />
</head>

<body>
  <section class="logIn2P">

    <div class="firstBlock">
      <div class="instaName">
        <img src="img/nameLogo.png" alt="instagram name" />
      </div>

      <div class="logInInput">
        <input type="text" class="TelEmailUser" placeholder=" Telefone, nome de usuário ou email " />

        <input type="password" class="passWord" placeholder=" Senha " />
      </div>

      <div class="logInBtn">
        <button><a href="#">Entrar</a></button>
      </div>

      <div class="or">
        <span>OU</span>
      </div>

      <div class="acessFacebook">

        <span> <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 266.893 266.895"
            id="facebook">
            <path fill="#485a96"
              d="M252.164 266.895c8.134 0 14.729-6.596 14.729-14.73V14.73c0-8.137-6.596-14.73-14.729-14.73H14.73C6.593 0 0 6.594 0 14.73v237.434c0 8.135 6.593 14.73 14.73 14.73h237.434z">
            </path>
            <path fill="#fff"
              d="M184.152 266.895V163.539h34.692l5.194-40.28h-39.887V97.542c0-11.662 3.238-19.609 19.962-19.609l21.329-.01V41.897c-3.689-.49-16.351-1.587-31.08-1.587-30.753 0-51.807 18.771-51.807 53.244v29.705h-34.781v40.28h34.781v103.355h41.597z">
            </path>
          </svg></span>

        <span><a href="facebook.com">Entrar com o Facebook</a></span>

      </div>

      <div class="forgetPassword">

        <span><a href="!">Esqueceu a senha?</a></span>


      </div>

    </div>

    <div class="secondBlock">

      <div class="DontHaveAccont">

        <p>Não tem uma conta? <a href="signIn.html">Cadastre-se</a></p>

      </div>

    </div>

    <div class="appDownload">

      
        <span class="haveapp" >Obtenha o aplicativo.</span>
      

      <div class="googleMicrosoft">

        <a class="google"
          href="https://play.google.com/store/apps/details?id=com.instagram.android&referrer=ig_mid%3D00F8FBDA-5CE0-4B36-9C0C-957D4B884507%26utm_campaign%3DloginPage%26utm_content%3Dlo%26utm_source%3Dinstagramweb%26utm_medium%3Dbadge%26original_referrer%3Dhttps%253A%252F%252Fwww.instagram.com%252F&pli=1"><img
            src="img/googlePlay.png" alt="googlePlay"></a>

<div class="microsoft">

<a href="https://apps.microsoft.com/detail/9NBLGGH5L9XT?hl=pt-br&gl=BR"><img src="img/microsoft.png" alt=""></a>

</div>

      </div>


    </div>


  </section>


</body>

</html>
