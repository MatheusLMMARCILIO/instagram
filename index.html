<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Instagram clone </title>
    <link rel="icon" href="img/instaIcon.webp" type="image">
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <section class="LoginPage">

        <div class="cellPhone">
            <img src="img/celularPictures.png" alt="celular">
        </div>

        <div class="firstBlock">

            <div class="logIn">

                <div class="instaName">
                    <img src="img/logoInsta.png" alt="instagram name">
                </div>

                <div class="inputsInsta">

                    <input type="text" placeholder=" Telefone, nome de usuário ou email">

                    <input type="password" placeholder=" Senha">
                </div>

                <div class="btnEnter">

                    <button><a href="#">Entrar</a></button>

                </div>

                <div class="or">
                    <span>OU</span>
                </div>

                <div class="enterWFacebook">
                    
                    <a href="#"> <svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="20" height="20"
                        viewBox="0 0 48 48">
                        <path fill="#3F51B5"
                            d="M42,37c0,2.762-2.238,5-5,5H11c-2.761,0-5-2.238-5-5V11c0-2.762,2.239-5,5-5h26c2.762,0,5,2.238,5,5V37z">
                        </path>
                        <path fill="#FFF"
                            d="M34.368,25H31v13h-5V25h-3v-4h3v-2.41c0.002-3.508,1.459-5.59,5.592-5.59H35v4h-2.287C31.104,17,31,17.6,31,18.723V21h4L34.368,25z">
                        </path>
                    </svg> Entrar com o Facebook</a>
                </div>

                <div class="forgetPassword">
                    <a href="#">Esqueceu a senha?</a>
                </div>

            </div>

            <div class="sencondBlock">

                <div class="dontHaveAccount">
                    <span>Não tem uma conta?<a href="#">Casdrate-se</a></span>
                </div>

                <div class="linksForDownload">
                    <span>Obtenha o aplicativo</span>
                </div>

                <div class="GooglePlay"></div>

                <div class="Microsoft"></div>


            </div>
        </div>

    </section>


</body>

</html>
